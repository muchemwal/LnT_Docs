  /v1/integration/health:
    get:
      tags: [Accounting, HR Integration]
      summary: Integration health dashboard
      description: Returns last sync timestamps and failed record counts for accounting and HR integrations.
      responses:
        '200':
          description: Integration health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  last_sync_at:
                    type: string
                    format: date-time
                  failed_records:
                    type: integer
