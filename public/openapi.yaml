      tags: [Reports]
      summary: DPO monthly data processing report
      description: Returns PHI volume, DSAR count, breach events, and consent statistics.
      parameters:
        - name: month
          in: query
          schema:
            type: string
            description: "YYYY-MM format"
      responses:
        '200':
          description: DPO report data

  # ═══════════════════════════════════════════════════════════════════════════
  # AUDIT SERVICE (port 3015)
  # ═══════════════════════════════════════════════════════════════════════════

  /v1/audit/events:
    post:
      tags: [Audit]
      summary: Record an audit event (INSERT-only)
      description: |
        Immutable audit log. No PUT, PATCH, or DELETE endpoints exist.
        Events include actor, IP, resource, previous/new values.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event_type, actor_id, resource_id]
              properties:
                event_type:
                  type: string
                  example: JOB_CREATED
                actor_id:
                  type: string
                  format: uuid
                actor_ip:
                  type: string
                resource_type:
                  type: string
                resource_id:
                  type: string
                  format: uuid
                previous_value:
                  type: object
                new_value:
                  type: object
      responses:
        '201':
          description: Audit event recorded (immutable)

  # ═══════════════════════════════════════════════════════════════════════════
  # COMPLIANCE SERVICE (port 3016)
  # ═══════════════════════════════════════════════════════════════════════════

  /v1/admin/dsar:
    post:
      tags: [Compliance]
      summary: Process a Data Subject Access Request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nhs_number]
              properties:
                nhs_number:
                  type: string
                requester_name:
                  type: string
                requester_relationship:
                  type: string
      responses:
        '200':
          description: DSAR processed, data package returned

  /v1/admin/erasure:
    post:
      tags: [Compliance]
      summary: Right-to-erasure workflow
      description: Blocked for records within 8-year clinical retention period.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nhs_number]
              properties:
                nhs_number:
                  type: string
                reason:
                  type: string
      responses:
        '200':
          description: Erasure processed or blocked by retention policy

  /v1/admin/data-processors:
    get:
      tags: [Compliance]
      summary: List registered data processors
      responses:
        '200':
          description: Data processor registry
    post:
      tags: [Compliance]
      summary: Register a new data processor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, purpose]
              properties:
                name:
                  type: string
                purpose:
                  type: string
                contract_reference:
                  type: string
                data_categories:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Data processor registered

  /v1/admin/data-processors/{id}:
    patch:
      tags: [Compliance]
      summary: Update a data processor record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Data processor updated

  /v1/admin/dpo-report:
    get:
      tags: [Compliance]
      summary: Monthly DPO report
      description: PHI volume, DSAR count, breach events, consent statistics.
      parameters:
        - name: month
          in: query
          schema:
            type: string
      responses:
        '200':
          description: DPO report data


  # ═══════════════════════════════════════════════════════════════════════════
  # HR INTEGRATION (port 3017)
  # ═══════════════════════════════════════════════════════════════════════════

  /v1/hr/sync/employee:
    post:
      tags: [HR Integration]
      summary: Sync an employee to Factorial HR
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employee_id]
              properties:
                employee_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Employee synced to Factorial HR

  /v1/hr/sync/shifts:
    post:
      tags: [HR Integration]
      summary: Sync shifts to Factorial HR
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                period_start:
                  type: string
                  format: date
                period_end:
                  type: string
                  format: date
                crew_member_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Shifts synced

  /v1/hr/sync/absence:
    post:
