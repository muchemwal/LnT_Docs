  # ═══════════════════════════════════════════════════════════════════════════
  # BILLING SERVICE — INVOICES (port 3012)
  # ═══════════════════════════════════════════════════════════════════════════

  /v1/invoices:
    post:
      tags: [Invoices]
      summary: Create a draft invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [client_id, line_items, subtotal, vat_amount, total_amount, due_date]
              properties:
                client_id:
                  type: string
                  format: uuid
                job_id:
                  type: string
                  format: uuid
                line_items:
                  type: array
                  items:
                    type: object
                    properties:
                      description:
                        type: string
                      amount:
                        type: number
                      vat_rate:
                        type: number
                subtotal:
                  type: number
                vat_amount:
                  type: number
                total_amount:
                  type: number
                due_date:
                  type: string
                  format: date
      responses:
        '201':
          description: Draft invoice created
    get:
      tags: [Invoices]
      summary: List invoices (filterable)
      parameters:
        - name: client_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, approved, synced, failed, overdue, paid]
        - name: sync_status
          in: query
          schema:
            type: string
            enum: [pending, synced, failed]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Paginated invoice list

  /v1/invoices/{id}:
    get:
      tags: [Invoices]
      summary: Get a single invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Invoice details
    patch:
      tags: [Invoices]
      summary: Update invoice fields
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Invoice updated

  /v1/invoices/{id}/approve:
    post:
      tags: [Invoices]
      summary: Approve invoice, generate PDF, store to S3
      description: Transitions invoice from draft to approved. Generates PDF and uploads to S3.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Invoice approved with PDF generated
        '422':
          description: Invoice not in draft status

