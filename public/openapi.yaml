      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ptf_id, patient_nhs_number, consent_type, consented]
              properties:
                ptf_id:
                  type: string
                  format: uuid
                patient_nhs_number:
                  type: string
                  description: Will be AES-256 encrypted
                consent_type:
                  type: string
                  enum: [data_processing, data_sharing]
                consented:
                  type: boolean
                representative_name:
                  type: string
                representative_reason:
                  type: string
                lawful_basis:
                  type: string
                  description: Required if consented is false (vital_interests, legitimate_task, etc.)
      responses:
        '201':
          description: Consent recorded

  /v1/consents/search:
    get:
      tags: [Consents]
      summary: DSAR search by NHS number or PTF ID (admin only)
