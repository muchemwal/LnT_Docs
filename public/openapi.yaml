  /v1/hr/export/worked-hours:
    post:
      tags: [HR Integration]
      summary: Export worked hours for a pay period
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [period_start, period_end]
              properties:
                period_start:
                  type: string
                  format: date
                period_end:
                  type: string
                  format: date
      responses:
        '200':
          description: Worked hours export data

  # ═══════════════════════════════════════════════════════════════════════════
  # ACCOUNTING INTEGRATION (port 3018)
  # ═══════════════════════════════════════════════════════════════════════════

  /v1/accounting/sync/invoice:
    post:
      tags: [Accounting]
      summary: Sync an invoice to Xero
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invoice_id]
              properties:
                invoice_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Invoice synced to Xero

  /v1/accounting/sync/contact:
    post:
      tags: [Accounting]
      summary: Sync a client contact to Xero
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [client_id]
              properties:
                client_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Contact synced to Xero

  /v1/accounting/payment-status/{externalRef}:
    get:
      tags: [Accounting]
      summary: Get payment status from Xero
      parameters:
        - name: externalRef
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment status from Xero

  /v1/accounting/oauth/callback:
    get:
      tags: [Accounting]
      summary: Xero OAuth 2.0 callback
      parameters:
        - name: code
          in: query
          required: true
