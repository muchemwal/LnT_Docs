            type: string
        - name: ptf_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Matching consent records

  /v1/consents/{id}:
    get:
      tags: [Consents]
      summary: Get a single consent record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Consent record details

  /v1/consents/{id}/withdraw:
    patch:
      tags: [Consents]
      summary: Withdraw consent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [withdrawal_reason]
              properties:
                withdrawal_reason:
                  type: string
      responses:
        '200':
          description: Consent withdrawn, erasure evaluation triggered

